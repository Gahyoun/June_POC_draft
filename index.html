        <div class="panel chart-panel">
          <div class="section-title"><h3>영어 예상점수 추이</h3><small>날짜별 line graph · 절대평가 기준</small></div>
          <div class="line-wrap"><svg id="linegraph" viewBox="0 0 760 400" role="img" aria-label="영어 예상점수 추이"></svg><div class="abs-grade">${[1,2,3,4,5,6,7,8,9].map(g=>`<span class="grade-pill ${g===grade?'active':''}">${g}등급 ${g===1?'90+':g===2?'80+':g===3?'70+':g===4?'60+':g===5?'50+':g===6?'40+':g===7?'30+':g===8?'20+':'~19'}</span>`).join('')}</div></div>
        </div>
      </section>`;
    }

    function renderChapterTable(p){
      return `<table class="chapter-table"><thead><tr><th>과목</th><th>챕터</th><th>unit</th><th>숙련도</th><th>중상난도</th><th>우선순위</th><th>추천 배정</th></tr></thead><tbody>${p.chapters.map(c=>`<tr><td><b>${c.subject}</b></td><td>${c.chapter}</td><td style="color:var(--slate)">${c.units.join(' · ')}</td><td><div class="score"><span>${c.mastery}</span><div class="bar"><i style="--w:${c.mastery}%;--c:${barColor(c.mastery)}"></i></div></div></td><td><div class="score"><span>${c.difficulty}</span><div class="bar"><i style="--w:${c.difficulty}%;--c:${barColor(c.difficulty)}"></i></div></div></td><td><span class="pill ${tagClass(c.status)}">${c.priority}</span></td><td>${c.weekly}</td></tr>`).join('')}</tbody></table>`;
    }

    function renderSolve(){
      const p=PROBLEM_BANK[state.problemId]; const u=currentUser(); const profile=currentProfile(); const previous=getResult(u.id,state.subject,p.id); const isEnglish=p.subjectType==='english';
      renderShell(`<div class="solver-shell">
        <section class="panel solver-main">
          <button class="back-btn" onclick="openDashboard()" type="button">← 리포트로 돌아가기</button>
          <div class="solver-head"><div><div class="eyebrow">${p.pcode} · ${p.difficultyLabel}</div><h2>${isEnglish?p.instruction:p.unit+' · '+p.concept}</h2></div><div><div class="timer" id="timer">00:00</div><span class="pill ${isEnglish?'red':''}">${subjectLabel()}</span></div></div>
          ${isEnglish ? renderEnglishProblem(p) : renderMathProblem(p)}
          <div class="solve-actions"><button class="ghost-btn" onclick="openDashboard()" type="button">나중에 풀기</button><button class="primary-btn" onclick="submitAnswer()" type="button">답안 제출</button></div>
          <div id="feedback-root"></div>
        </section>
        <aside class="panel solver-side">
          <div class="side-card"><h4>추천 근거</h4><p>${p.metaReason[u.id]}</p></div>
          <div class="side-card"><h4>문항 메타데이터</h4><dl><dt>과목</dt><dd>${p.subject}</dd><dt>챕터</dt><dd>${p.chapter}</dd><dt>unit</dt><dd>${p.unit}</dd><dt>concept</dt><dd>${p.concept}</dd><dt>난도</dt><dd>${p.difficultyLabel}</dd><dt>유형</dt><dd>${isEnglish?'영어 독해':'객관식'}</dd></dl></div>
          <div class="side-card"><h4>오늘 큐</h4><div class="queue-mini">${profile.recommendations.slice(0,7).map(r=>`<div class="mini"><b>${String(r.slot).padStart(2,'0')} · ${PROBLEM_BANK[r.id]?PROBLEM_BANK[r.id].unit:r.title}</b><span>${r.group} · ${r.mode}</span></div>`).join('')}</div></div>
          ${previous?`<div class="side-card"><h4>이전 풀이 기록</h4><div class="result-row"><b>${previous.correct?'정답':'오답'}</b><span>${previous.elapsedSec}초 · 선택 ${previous.selected+1}번</span></div></div>`:''}
        </aside>
      </div>`);
      if(isEnglish) setupEnglishAnnotation(); else setupCanvas();
      startTimer();
    }

    function renderMathProblem(p){
      return `<div class="question-box"><div class="problem-text">${p.statement}</div><div class="options math-options" id="options">${p.options.map((o,i)=>`<button type="button" class="opt" onclick="selectOption(${i})">${o}</button>`).join('')}</div></div><div class="scratch"><div class="scratch-head"><b>간단 필기 영역</b><div class="tools"><button class="tool-btn" onclick="clearCanvas()" type="button">지우기</button></div></div><canvas id="scratchpad"></canvas></div>`;
    }
    function cleanChoiceLabel(text){ return String(text).replace(/^[①②③④⑤]\s*/,''); }
    function circledChoiceLabel(i){ return ['①','②','③','④','⑤'][i] || String(i+1); }
    function renderEnglishProblem(p){
      return `<div class="question-box"><div class="passage-toolbar"><b>본문 필기</b><button class="tool-btn" onclick="highlightSelection()" type="button">형광펜</button><button class="tool-btn" onclick="underlineSelection()" type="button">밑줄</button><button class="tool-btn" onclick="insertInlineNote()" type="button">메모 삽입</button><button class="tool-btn" onclick="resetPassage()" type="button">본문 초기화</button><span style="color:var(--steel);font-size:12px;font-weight:800">지문 일부를 드래그한 뒤 사용</span></div><div class="passage" id="englishPassage" contenteditable="true" spellcheck="false">${p.passage}</div><div class="options english-options" id="options">${p.options.map((o,i)=>`<button type="button" class="opt" onclick="selectOption(${i})"><span class="opt-num">${circledChoiceLabel(i)}</span><span class="opt-text">${cleanChoiceLabel(o)}</span></button>`).join('')}</div></div>`;
    }

    window.selectOption=function(i){ state.selected=i; document.querySelectorAll('.opt').forEach((el,idx)=>{ el.classList.toggle('selected',idx===i); }); };
    window.submitAnswer=function(){
      const u=currentUser(), p=PROBLEM_BANK[state.problemId]; if(state.selected===null){ alert('답안을 선택하세요.'); return; }
      const elapsedSec=Math.max(1,Math.round((Date.now()-state.startTime)/1000)); const correct=state.selected===p.answerIndex;
      const annotation = p.subjectType==='english' ? (document.getElementById('englishPassage')?.innerHTML || '') : null;
      saveResult(u.id,p.subjectType,p.id,{correct, selected:state.selected, answerIndex:p.answerIndex, elapsedSec, submittedAt:new Date().toISOString(), annotation, wrongReason:null});
      document.querySelectorAll('.opt').forEach((el,idx)=>{ el.disabled=true; if(idx===p.answerIndex) el.classList.add('correct'); if(idx===state.selected && !correct) el.classList.add('wrong'); });
      const root=document.getElementById('feedback-root');
      root.innerHTML=`<div class="feedback ${correct?'correct':'wrong'}"><h3>${correct?'정답입니다.':'오답입니다.'}</h3><p>선택: ${p.options[state.selected]} · 정답: ${p.options[p.answerIndex]} · 풀이시간: ${elapsedSec}초</p><div class="explain"><b>해설</b>${p.explanation}</div>${correct?`<div class="cause-tags"><button type="button" onclick="openDashboard()">대시보드 반영 확인</button><button type="button" onclick="openProblem('${p.id}')">다시 풀기</button></div>`:`<div class="cause-tags"><button onclick="setWrongReason('개념 부족')">개념 부족</button><button onclick="setWrongReason('조건 오독')">조건 오독</button><button onclick="setWrongReason('선지 비교 실패')">선지 비교 실패</button><button onclick="setWrongReason('시간 초과')">시간 초과</button><button onclick="setWrongReason('풀이 방향 불명확')">풀이 방향 불명확</button></div><p style="margin-top:12px;color:#991b1b;font-weight:900">오답노트 저장 + D+1 쌍둥이 문항 예약 상태로 처리됩니다.</p>`}</div>`;
    };
    window.setWrongReason=function(reason){ const u=currentUser(), p=PROBLEM_BANK[state.problemId]; const all=getResults(); const key=`${u.id}:${p.subjectType}:${p.id}`; if(all[key]){ all[key].wrongReason=reason; all[key].twinScheduled='D+1'; localStorage.setItem('ns_poc_results_v2',JSON.stringify(all)); } alert(`${reason} 태그로 오답노트에 저장했습니다.`); };

    function startTimer(){ if(timerHandle) clearInterval(timerHandle); const el=document.getElementById('timer'); if(!el) return; timerHandle=setInterval(()=>{ const sec=Math.max(0,Math.floor((Date.now()-state.startTime)/1000)); const mm=String(Math.floor(sec/60)).padStart(2,'0'), ss=String(sec%60).padStart(2,'0'); el.textContent=`${mm}:${ss}`; },250); }
    function setupCanvas(){
      const canvas=document.getElementById('scratchpad'); if(!canvas) return; const ctx=canvas.getContext('2d'); const resize=()=>{ const rect=canvas.getBoundingClientRect(); const ratio=window.devicePixelRatio||1; canvas.width=Math.max(1,Math.floor(rect.width*ratio)); canvas.height=Math.max(1,Math.floor(rect.height*ratio)); ctx.setTransform(ratio,0,0,ratio,0,0); ctx.lineWidth=2.6; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.strokeStyle='#0b1220'; };
      resize(); window.addEventListener('resize',resize,{once:true}); let drawing=false,last=null; const pos=e=>{ const rect=canvas.getBoundingClientRect(); return {x:e.clientX-rect.left,y:e.clientY-rect.top}; };
      canvas.addEventListener('pointerdown',e=>{ drawing=true; last=pos(e); canvas.setPointerCapture(e.pointerId); }); canvas.addEventListener('pointermove',e=>{ if(!drawing) return; const p=pos(e); ctx.beginPath(); ctx.moveTo(last.x,last.y); ctx.lineTo(p.x,p.y); ctx.stroke(); last=p; }); canvas.addEventListener('pointerup',()=>{ drawing=false; last=null; }); canvas.addEventListener('pointercancel',()=>{ drawing=false; last=null; });
    }
    window.clearCanvas=function(){ const canvas=document.getElementById('scratchpad'); if(!canvas) return; const ctx=canvas.getContext('2d'); ctx.clearRect(0,0,canvas.width,canvas.height); };

    function selectionInsidePassage(){ const sel=window.getSelection(); const box=document.getElementById('englishPassage'); if(!sel || sel.rangeCount===0 || !box) return false; const node=sel.anchorNode; return node && box.contains(node.nodeType===1?node:node.parentNode); }
    function setupEnglishAnnotation(){ const p=PROBLEM_BANK[state.problemId]; window.__originalPassage = p.passage; }
    window.highlightSelection=function(){ if(!selectionInsidePassage()){ alert('지문 안의 텍스트를 먼저 드래그하세요.'); return; } document.execCommand('backColor', false, '#fff3a3'); };
    window.underlineSelection=function(){ if(!selectionInsidePassage()){ alert('지문 안의 텍스트를 먼저 드래그하세요.'); return; } document.execCommand('underline', false, null); };
    window.insertInlineNote=function(){ const box=document.getElementById('englishPassage'); if(!box) return; box.focus(); document.execCommand('insertHTML', false, '<span class="inline-note" contenteditable="true">메모</span>'); };
    window.resetPassage=function(){ const box=document.getElementById('englishPassage'); if(box) box.innerHTML = window.__originalPassage || PROBLEM_BANK['NewLearn-S00-Q09'].passage; };

    function drawRadar(id, labels, mastery, difficulty){
      const svg=document.getElementById(id); if(!svg) return; const cx=380, cy=275, r=190, n=labels.length; const levels=[20,40,60,80,100]; const pts=(values)=>values.map((v,i)=>{ const a=-Math.PI/2 + i*2*Math.PI/n; const rr=r*(v/100); return [cx+Math.cos(a)*rr, cy+Math.sin(a)*rr]; }); const poly=(points)=>points.map(p=>p.join(',')).join(' '); let html='';
      levels.forEach(l=>{ const points=labels.map((_,i)=>{ const a=-Math.PI/2+i*2*Math.PI/n; const rr=r*(l/100); return [cx+Math.cos(a)*rr,cy+Math.sin(a)*rr]; }); html += `<polygon points="${poly(points)}" fill="none" stroke="#dbe2ee" stroke-width="1"/>`; html += `<text x="${cx+6}" y="${cy-r*(l/100)+4}" class="radar-grid-label">${l}</text>`; });
      labels.forEach((lab,i)=>{ const a=-Math.PI/2+i*2*Math.PI/n; const x2=cx+Math.cos(a)*r, y2=cy+Math.sin(a)*r; html += `<line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" stroke="#dbe2ee" stroke-width="1"/>`; const lx=cx+Math.cos(a)*(r+70), ly=cy+Math.sin(a)*(r+70); html += `<text x="${lx}" y="${ly-7}" text-anchor="middle" class="radar-axis-label">${lab[0]}</text><text x="${lx}" y="${ly+10}" text-anchor="middle" class="radar-axis-sub">${lab[1]}</text>`; });
      const p1=pts(mastery), p2=pts(difficulty); html += `<polygon points="${poly(p1)}" fill="var(--theme)" opacity=".18" stroke="var(--theme)" stroke-width="4"/>`; html += `<polyline points="${poly(p2)} ${p2[0].join(',')}" fill="none" stroke="#566176" stroke-width="3" stroke-dasharray="7 7"/>`; p1.forEach(p=>html+=`<circle cx="${p[0]}" cy="${p[1]}" r="7" fill="var(--theme)" stroke="#fff" stroke-width="3"/>`); p2.forEach(p=>html+=`<circle cx="${p[0]}" cy="${p[1]}" r="6" fill="#fff" stroke="#566176" stroke-width="3"/>`); svg.innerHTML=html;
    }

    function drawLineGraph(id, data){
      const svg=document.getElementById(id); if(!svg) return; const W=760,H=400, L=62, R=26, T=30, B=58; const chartW=W-L-R, chartH=H-T-B; const x=i=>L + (chartW*(i/(data.length-1))); const y=s=>T + chartH*(1-s/100); let html='';
      [90,80,70,60].forEach(cut=>{ html += `<rect x="${L}" y="${y(cut)}" width="${chartW}" height="${cut===90?y(80)-y(90):cut===80?y(70)-y(80):cut===70?y(60)-y(70):y(50)-y(60)}" class="grade-band"/>`; });
      [100,90,80,70,60,50,40].forEach(v=>{ html += `<line x1="${L}" y1="${y(v)}" x2="${W-R}" y2="${y(v)}" class="chart-grid"/><text x="${L-12}" y="${y(v)+4}" text-anchor="end" class="chart-label">${v}</text>`; });
      data.forEach((d,i)=>{ html += `<line x1="${x(i)}" y1="${T}" x2="${x(i)}" y2="${H-B}" class="chart-grid" opacity=".55"/><text x="${x(i)}" y="${H-B+28}" text-anchor="middle" class="chart-label">${d.date}</text>`; });
      const path=data.map((d,i)=>`${i?'L':'M'} ${x(i)} ${y(d.score)}`).join(' '); html += `<path d="${path}" class="grade-line"/>`; data.forEach((d,i)=>{ html += `<circle cx="${x(i)}" cy="${y(d.score)}" r="6" class="grade-dot"/><text x="${x(i)}" y="${y(d.score)-12}" text-anchor="middle" class="chart-score-label">${d.score}</text>`; });
      [[90,'1등급'],[80,'2등급'],[70,'3등급'],[60,'4등급']].forEach(([cut,label])=>{ html += `<text x="${W-R-8}" y="${y(cut)+16}" text-anchor="end" class="chart-label">${label} 컷</text>`; });
      html += `<line x1="${L}" y1="${T}" x2="${L}" y2="${H-B}" class="chart-axis"/><line x1="${L}" y1="${H-B}" x2="${W-R}" y2="${H-B}" class="chart-axis"/>`;
      svg.innerHTML=html;
    }

    function render(){ if(timerHandle) clearInterval(timerHandle); if(state.page==='solve') renderSolve(); else renderDashboard(); }
    render();
  </script>
</body>
</html>
