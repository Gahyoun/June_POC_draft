    function renderRecCard(u,r){

      return `<article class="rec-card ${p?'featured':'locked'}">
        <div>
          <div class="meta"><span class="pill gray">${String(r.slot).padStart(2,'0')}</span>${statusPill}<span class="pill ${r.mode==='심화'||r.mode==='고난도'?'warn':'gray'}">${r.mode}</span>${p?'<span class="pill success">실제 문항</span>':''}</div>

          <p>${r.reason}${p?`<br><span class="mono">${p.unitCode} · ${p.difficultyLabel} · ${p.pcode}</span>`:''}</p>

    function drawRadar(u){
      const svg = document.getElementById("radar"); if(!svg) return;
      const cx=380, cy=280, r=190, levels=[20,40,60,80,100], n=u.labels.length;
      const point = (idx,val)=>{ const angle=-Math.PI/2 + idx*2*Math.PI/n; const rr=r*(val/100); return [cx+Math.cos(angle)*rr, cy+Math.sin(angle)*rr]; };
      const poly = vals => vals.map((v,i)=>point(i,v).join(",")).join(" ");
      let html="";
      levels.forEach(l=>{ html += `<polygon points="${poly(new Array(n).fill(l))}" fill="none" stroke="#E2E8F0" stroke-width="1"/>`; });
      for(let i=0;i<n;i++){ const [x,y]=point(i,100); html += `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#D7DCE5"/>`; const [lx,ly]=point(i,118); const [a,b]=u.labels[i]; const anchor=lx>cx+20?"start":lx<cx-20?"end":"middle"; html += `<text x="${lx}" y="${ly-7}" text-anchor="${anchor}" class="radar-axis-label">${a}</text><text x="${lx}" y="${ly+9}" text-anchor="${anchor}" class="radar-axis-sub">${b}</text>`; }
      levels.forEach(l=>{ const [x,y]=point(0,l); html += `<text x="${x+8}" y="${y+4}" class="radar-grid-label">${l}</text>`; });
      const mastery = u.chapters.map(c=>c.mastery), diff=u.chapters.map(c=>c.difficulty);
      html += `<polygon points="${poly(mastery)}" fill="rgba(37,99,235,.14)" stroke="#2563EB" stroke-width="4"/>`;
      html += `<polygon points="${poly(diff)}" fill="rgba(81,91,111,.04)" stroke="#515B6F" stroke-width="4" stroke-dasharray="9 7"/>`;
      mastery.forEach((v,i)=>{ const [x,y]=point(i,v); html += `<circle cx="${x}" cy="${y}" r="7" fill="#2563EB" stroke="#fff" stroke-width="3"><title>${u.chapters[i].chapter} 숙련도 ${v}</title></circle>`; });
      diff.forEach((v,i)=>{ const [x,y]=point(i,v); html += `<circle cx="${x}" cy="${y}" r="6" fill="#fff" stroke="#515B6F" stroke-width="3"><title>${u.chapters[i].chapter} 난도 ${v}</title></circle>`; });
      svg.innerHTML=html;
    }

    function renderSolve(){
      const u=USERS[state.userId], p=PROBLEM_BANK[state.problemId];
      const previous = getResult(u.id,p.id);
      const selected = state.selected;
      renderShell(`
        <button class="back-btn" type="button" onclick="openDashboard()">← 추천 문항으로 돌아가기</button>
        <div class="solver-shell">
          <section class="panel solver-main">
            <div class="solver-head">
              <div><div class="eyebrow">PROBLEM SOLVING · ${u.name}</div><h2>${p.subject} · ${p.unit}</h2><p style="margin:8px 0 0;color:var(--slate)">${p.concept} · ${p.difficultyLabel} · ${p.pcode}</p></div>
              <div><div class="timer" id="timer">00:00</div><div style="text-align:right;color:var(--steel);font-size:12px;font-weight:800">목표 ${p.estimatedSeconds[u.id]}초</div></div>
            </div>
            <div class="question-box">
              <div class="problem-text">${p.statement}</div>
              <div class="options" id="options">
                ${p.options.map((o,i)=>`<button type="button" class="opt ${selected===i?'selected':''}" onclick="selectOption(${i})">${o}</button>`).join("")}
              </div>
            </div>
            <div class="scratch">
              <div class="scratch-head"><b>간단 필기 영역</b><div class="tools"><button class="tool-btn" onclick="clearCanvas()" type="button">지우기</button></div></div>
              <canvas id="scratchpad"></canvas>
            </div>
            <div class="solve-actions">
              <button class="ghost-btn" onclick="openDashboard()" type="button">나중에 풀기</button>
              <button class="primary-btn" onclick="submitAnswer()" type="button">답안 제출</button>
            </div>
            <div id="feedback-root"></div>
          </section>
          <aside class="panel solver-side">
            <div class="side-card"><h4>추천 근거</h4><p style="margin:0;color:var(--slate);font-size:13.5px;line-height:1.6">${p.metaReason[u.id]}</p></div>
            <div class="side-card"><h4>문항 메타데이터</h4><dl><dt>과목</dt><dd>${p.subject}</dd><dt>챕터</dt><dd>${p.chapter}</dd><dt>unit</dt><dd>${p.unit}</dd><dt>concept</dt><dd>${p.concept}</dd><dt>난도</dt><dd>${p.difficultyLabel}</dd><dt>유형</dt><dd>객관식</dd></dl></div>
            <div class="side-card"><h4>오늘 큐</h4><div class="queue-mini">${u.recommendations.slice(0,7).map(r=>`<div class="mini"><b>${String(r.slot).padStart(2,'0')} · ${PROBLEM_BANK[r.id]?PROBLEM_BANK[r.id].unit:r.title}</b><span>${r.group} · ${r.mode}</span></div>`).join("")}</div></div>
            ${previous?`<div class="side-card"><h4>이전 풀이 기록</h4><div class="result-row"><b>${previous.correct?'정답':'오답'}</b><span>${previous.elapsedSec}초 · 선택 ${previous.selected+1}번</span></div></div>`:""}
          </aside>
        </div>`);
      setupCanvas();
      startTimer();
    }

    function selectOption(i){ state.selected=i; document.querySelectorAll('.opt').forEach((el,idx)=>{ el.classList.toggle('selected',idx===i); }); }
    function submitAnswer(){
      const u=USERS[state.userId], p=PROBLEM_BANK[state.problemId];
      if(state.selected===null){ alert("답안을 선택하세요."); return; }
      const elapsedSec = Math.max(1, Math.round((Date.now()-state.startTime)/1000));
      const correct = state.selected === p.answerIndex;
      saveResult(u.id,p.id,{correct, selected:state.selected, answerIndex:p.answerIndex, elapsedSec, submittedAt:new Date().toISOString(), wrongReason:null});
      const opts=document.querySelectorAll('.opt'); opts.forEach((el,idx)=>{ el.disabled=true; if(idx===p.answerIndex) el.classList.add('correct'); if(idx===state.selected && !correct) el.classList.add('wrong'); });
      const root=document.getElementById('feedback-root');
      root.innerHTML = `<div class="feedback ${correct?'correct':'wrong'}"><h3>${correct?'정답입니다.':'오답입니다.'}</h3><p>선택: ${p.options[state.selected]} · 정답: ${p.options[p.answerIndex]} · 풀이시간: ${elapsedSec}초</p><div class="explain"><b>해설</b>${p.explanation}</div>${correct?`<div class="cause-tags"><button type="button" onclick="openDashboard()">대시보드 반영 확인</button><button type="button" onclick="openProblem('${p.id}')">다시 풀기</button></div>`:`<div class="cause-tags"><button onclick="setWrongReason('개념 부족')">개념 부족</button><button onclick="setWrongReason('조건 오독')">조건 오독</button><button onclick="setWrongReason('계산 실수')">계산 실수</button><button onclick="setWrongReason('시간 초과')">시간 초과</button><button onclick="setWrongReason('풀이 방향 불명확')">풀이 방향 불명확</button></div><p style="margin-top:12px;color:#991b1b;font-weight:800">오답노트 저장 + D+1 쌍둥이 문항 예약 상태로 처리됩니다.</p>`}</div>`;
    }
    function setWrongReason(reason){ const u=USERS[state.userId], p=PROBLEM_BANK[state.problemId]; const all=getResults(); const key=`${u.id}:${p.id}`; if(all[key]){ all[key].wrongReason=reason; all[key].twinScheduled="D+1"; localStorage.setItem("ns_poc_results",JSON.stringify(all)); } alert(`${reason} 태그로 오답노트에 저장했습니다.`); }

    function startTimer(){ if(timerHandle) clearInterval(timerHandle); const el=document.getElementById('timer'); if(!el) return; timerHandle=setInterval(()=>{ const sec=Math.max(0,Math.floor((Date.now()-state.startTime)/1000)); const mm=String(Math.floor(sec/60)).padStart(2,'0'), ss=String(sec%60).padStart(2,'0'); el.textContent=`${mm}:${ss}`; },250); }
    function setupCanvas(){
      const canvas=document.getElementById('scratchpad'); if(!canvas) return; const ctx=canvas.getContext('2d');
      const resize=()=>{ const rect=canvas.getBoundingClientRect(); const ratio=window.devicePixelRatio||1; canvas.width=Math.max(1,Math.floor(rect.width*ratio)); canvas.height=Math.max(1,Math.floor(rect.height*ratio)); ctx.setTransform(ratio,0,0,ratio,0,0); ctx.lineWidth=2.6; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.strokeStyle='#0b1220'; };
      resize(); window.addEventListener('resize',resize,{once:true}); let drawing=false,last=null;
      const pos=e=>{ const rect=canvas.getBoundingClientRect(); return {x:e.clientX-rect.left,y:e.clientY-rect.top}; };
      canvas.addEventListener('pointerdown',e=>{ drawing=true; last=pos(e); canvas.setPointerCapture(e.pointerId); });
      canvas.addEventListener('pointermove',e=>{ if(!drawing) return; const p=pos(e); ctx.beginPath(); ctx.moveTo(last.x,last.y); ctx.lineTo(p.x,p.y); ctx.stroke(); last=p; });
      canvas.addEventListener('pointerup',()=>{ drawing=false; last=null; }); canvas.addEventListener('pointercancel',()=>{ drawing=false; last=null; });
    }
    function clearCanvas(){ const canvas=document.getElementById('scratchpad'); if(!canvas) return; const ctx=canvas.getContext('2d'); ctx.clearRect(0,0,canvas.width,canvas.height); }

    function render(){ if(timerHandle) clearInterval(timerHandle); if(state.page==="solve") renderSolve(); else renderDashboard(); }
    render();
  </script>
</body>
</html>
